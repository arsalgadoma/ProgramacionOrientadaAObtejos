{{ define "content" }}
<section class="section has-background-light">
  <div class="container">
    <h1 class="title is-3">{{ .Title }}</h1>

    {{ with .Data }}
      {{ if gt (len .) 0 }}
      <table class="table is-fullwidth is-striped">
        <thead><tr>
          <th>Producto</th><th>Precio</th><th>Cant.</th><th>Subtotal</th><th></th>
        </tr></thead>
        <tbody>
          {{ range . }}
          <tr>
            <td>{{ .Nombre }}</td>
            <td>${{ .Precio }}</td>
            <td>{{ .Cantidad }}</td>
            <td><strong>${{ .Subtotal }}</strong></td>
            <td>
              <form action="/carrito/eliminar" method="POST">
                <input type="hidden" name="itemID" value="{{ .ItemCarID }}">
                <button class="button is-small is-danger">Quitar</button>
              </form>
            </td>
          </tr>
          {{ end }}
        </tbody>
      </table>

      <div class="is-flex is-justify-content-space-between">
        <form action="/carrito/vaciar" method="POST">
          <button class="button is-warning is-light">Vaciar carrito</button>
        </form>
        <a class="button is-primary" href="/orden/checkout">Continuar a pagar</a>
      </div>

      {{ else }}
        <p class="has-text-grey has-text-centered">Tu carrito está vacío.</p>
      {{ end }}
    {{ end }}
  </div>
</section>
{{ end }}
