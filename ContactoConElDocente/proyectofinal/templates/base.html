{{ define "base" }}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Store | Tu Tienda Universitaria</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Configuración del tema Lila */
    :root {
      /* Lila Principal */
      --bulma-primary: #8e44ad; 
      --bulma-primary-h: 282deg;
      --bulma-primary-s: 44%;
      --bulma-primary-l: 47%;
      
      /* Versión más clara para fondos o estados hover */
      --bulma-link: #a29bfe;
      --bulma-info: #6c5ce7;
    }

    /* Ajuste para que el texto sobre lila siempre sea blanco */
    .is-primary {
      color: #fff !important;
    }

    /* Personalización extra para la tienda */
    .navbar-item b {
      color: var(--bulma-primary);
    }
    
    .has-background-lila-light {
      background-color: #f3f0ff;
    }

    .footer {
      border-top: 3px solid var(--bulma-primary);
    }
  </style>
</head>
<body class="has-background-lila-light" style="min-height: 100vh;">

<nav class="navbar is-white is-spaced has-shadow" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item" href="/">
        <img src="https://static.vecteezy.com/system/resources/previews/000/554/815/non_2x/shopping-cart-vector-icon.jpg" alt="Logo" style="max-height: 40px; border-radius: 5px;">
        <b class="ml-2 is-size-4">E-SHOP</b>
      </a>
      <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarMenu">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </a>
    </div>

    <div id="navbarMenu" class="navbar-menu">
      <div class="navbar-start">
        <a class="navbar-item is-tab" href="/">Inicio</a>
        <a class="navbar-item is-tab" href="/categorias">Categorías</a>
        <a class="navbar-item is-tab" href="/productos">Productos</a>
      </div>

      <div class="navbar-end">
        <div class="navbar-item">
          <div class="field has-addons">
            <div class="control">
              <input class="input is-rounded is-primary" type="text" placeholder="Buscar productos...">
            </div>
            <div class="control">
              <button class="button is-primary is-rounded">
                <i class="fas fa-search"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="navbar-item">
          <div class="buttons">
            <a class="button is-light is-rounded" href="/carrito">
              <span class="icon has-text-primary"><i class="fas fa-shopping-cart"></i></span>
              <span>Carrito</span>
              <span id="cart-badge" class="tag is-info is-rounded ml-1">{{ .CartCount }}</span>
            </a>

            {{ if .Usuario }}
              <div class="field is-grouped">
                <p class="control">
                  <span class="button is-static is-rounded">
                    <i class="fas fa-user-circle mr-2 has-text-primary"></i>
                    {{ .Usuario.Nombre }}
                  </span>
                </p>
                <p class="control">
                  <form action="/logout" method="POST" style="display:inline;">
                    <button class="button is-danger is-outlined is-rounded" type="submit">
                      <i class="fas fa-right-from-bracket mr-1"></i>
                    </button>
                  </form>
                </p>
              </div>
            {{ else }}
              <a class="button is-primary is-rounded" href="/login">
                <strong>Mi Cuenta</strong>
              </a>
              <a class="button is-light is-rounded" href="/registro">
                Crear cuenta
              </a>
            {{ end }}
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container px-4">
    {{ block "content" . }}{{ end }}
  </div>
</main>

<footer class="footer has-background-white mt-6">
  <div class="content has-text-centered">
    <p>
      <strong class="has-text-primary">E-SHOP</strong> &copy; 2026. 
      <span class="tag is-light">Tu Tienda Universitaria</span>
    </p>
    <div class="icons">
        <span class="icon is-medium has-text-primary"><i class="fab fa-instagram"></i></span>
        <span class="icon is-medium has-text-primary"><i class="fab fa-facebook"></i></span>
    </div>
  </div>
</footer>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const $navbarBurgers = Array.prototype.slice.call(document.querySelectorAll('.navbar-burger'), 0);
    if ($navbarBurgers.length > 0) {
      $navbarBurgers.forEach(el => {
        el.addEventListener('click', () => {
          const target = el.dataset.target;
          const $target = document.getElementById(target);
          el.classList.toggle('is-active');
          $target.classList.toggle('is-active');
        });
      });
    }
  });
</script>
</body>
</html>
{{ end }}
